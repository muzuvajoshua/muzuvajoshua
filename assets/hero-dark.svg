<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muzuva Joshua — Full-Stack Engineer building AI-powered products">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#101013"/>
    </linearGradient>
    <linearGradient id="accent" x1="82" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes fadeUp { from { opacity: 0 } to { opacity: 1 } }
      @keyframes draw { to { stroke-dashoffset: 0 } }
      .r { opacity: 0; animation: fadeUp .9s ease forwards }
      .d1 { animation-delay: .15s } .d2 { animation-delay: .35s }
      .d3 { animation-delay: .55s } .d4 { animation-delay: .75s }
      .line { stroke-dasharray: 480; stroke-dashoffset: 480; animation: draw 1.4s ease .6s forwards }
      .name { font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif; font-weight: 600 }
      .body { font-family: 'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif }
      .mono { font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace }
    </style>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <ellipse cx="1040" cy="180" rx="320" ry="220" fill="url(#glow)"/>

  <!-- node graph motif (right) -->
  <g stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.25" class="r d4">
    <line x1="980" y1="96"  x2="1108" y2="150"/>
    <line x1="1108" y1="150" x2="1190" y2="120"/>
    <line x1="1108" y1="150" x2="1064" y2="252"/>
    <line x1="1064" y1="252" x2="1168" y2="284"/>
    <line x1="980" y1="96"  x2="1064" y2="252"/>
  </g>
  <g fill="#0a0a0b" stroke="#f59e0b" stroke-width="1.5" class="r d4">
    <circle cx="980"  cy="96"  r="5"><animate attributeName="r" values="5;6.5;5" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="120" r="4"><animate attributeName="r" values="4;5.5;4" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="1168" cy="284" r="4"><animate attributeName="r" values="4;5.5;4" dur="3.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1064" cy="252" r="4"><animate attributeName="r" values="4;5.5;4" dur="3.0s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>
  <circle cx="1108" cy="150" r="6" fill="#f59e0b">
    <animate attributeName="fill-opacity" values="1;0.45;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- traveling signal pulse -->
  <circle r="3.5" fill="#fcd34d">
    <animateMotion dur="4s" repeatCount="indefinite" path="M980 96 L1108 150 L1064 252 L1168 284"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- text block (left) -->
  <text x="82" y="128" class="mono r d1" font-size="14" letter-spacing="4" fill="#f59e0b">FULL-STACK ENGINEER  ·  AI / ML</text>
  <text x="80" y="202" class="name r d2" font-size="66" letter-spacing="-1" fill="#fafafa">Muzuva Joshua</text>
  <text x="82" y="250" class="body r d3" font-size="22" fill="#a1a1aa">From the model to the interface.</text>
  <line x1="82" y1="288" x2="562" y2="288" stroke="url(#accent)" stroke-width="2" class="line"/>
  <text x="82" y="318" class="mono r d4" font-size="13" letter-spacing="1.5" fill="#71717a">TypeScript  ·  React  ·  Python  ·  PyTorch  ·  LLMs</text>
</svg>
